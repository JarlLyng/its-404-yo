name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build & test
        run: |
          xcodebuild \
            -project Its404Yo.xcodeproj \
            -scheme Its404Yo \
            -destination 'platform=macOS' \
            -clonedSourcePackagesDirPath .build-spm \
            CODE_SIGNING_ALLOWED=NO \
            test
